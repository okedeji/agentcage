name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # macOS runner: the release fetches the macOS Lima bundles and the
    # before-hook cross-compiles the linux companions. A Linux runner would do
    # too (the fetch is arch-explicit), but macOS keeps parity with where the
    # tool primarily runs.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with contents:write on okedeji/homebrew-tap, so the
          # release can push the updated formula there. Set this repo secret
          # before the first tagged release, or drop the brews block to skip it.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
