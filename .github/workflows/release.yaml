name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build agentcage binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-X main.version=${VERSION}" -o agentcage-linux-${{ matrix.goarch }} ./cmd/agentcage/
      - name: Build cage-internal binaries
        run: |
          for svc in cage-init payload-proxy findings-sidecar directive-sidecar; do
            CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
              go build -trimpath -o cage-internal-${svc}-linux-${{ matrix.goarch }} ./cmd/cage-internal/${svc}/
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: |
            agentcage-linux-${{ matrix.goarch }}
            cage-internal-*-linux-${{ matrix.goarch }}

  build-cage-rootfs:
    runs-on: ubuntu-latest
    needs: [build-linux]
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/download-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: bin/cage-internal
      - name: Make binaries executable
        run: chmod +x bin/cage-internal/*
      - name: Install qemu-user-static for cross-arch
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Build cage rootfs
        run: |
          sudo BINDIR=bin/cage-internal ./scripts/build-cage-rootfs.sh ${{ matrix.arch }} cage-rootfs-${{ matrix.arch }}.ext4
      - uses: actions/upload-artifact@v4
        with:
          name: cage-rootfs-${{ matrix.arch }}
          path: cage-rootfs-${{ matrix.arch }}.ext4.gz

  build-falco:
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Cache Falco build
        uses: actions/cache@v4
        with:
          path: falco-build-${{ matrix.arch }}
          key: falco-0.43.0-modern-bpf-v2-${{ matrix.arch }}
      - name: Build Falco from source (musl)
        run: |
          mkdir -p falco-build-${{ matrix.arch }}
          if [ -f "falco-build-${{ matrix.arch }}/userspace/falco/falco" ]; then
            cp "falco-build-${{ matrix.arch }}/userspace/falco/falco" falco-${{ matrix.arch }}
            echo "Using cached Falco binary"
          else
            docker run --rm \
              -v $PWD/falco-build-${{ matrix.arch }}:/build/build \
              -v $PWD:/out \
              alpine:3.19 /bin/sh -c '
                apk add g++ gcc cmake make git bash perl linux-headers \
                  autoconf automake m4 libtool elfutils-dev libelf-static \
                  binutils bpftool clang
                git clone --depth 1 --branch 0.43.0 \
                  https://github.com/falcosecurity/falco.git /build/src
                cd /build/build
                cmake -DUSE_BUNDLED_DEPS=ON -DMUSL_OPTIMIZED_BUILD=ON \
                  -DBUILD_FALCO_MODERN_BPF=ON \
                  -DCMAKE_BUILD_TYPE=Release /build/src
                make -j$(nproc) falco
                cp /build/build/userspace/falco/falco /out/falco-${{ matrix.arch }}
              '
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: falco-${{ matrix.arch }}
          path: falco-${{ matrix.arch }}

  build-vm-assets:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            kernel_arch: x86_64
          - arch: arm64
            kernel_arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Cache VM kernel
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: vmlinux-6.12-${{ matrix.arch }}
          key: vmlinux-6.12.84-${{ matrix.arch }}-${{ hashFiles('scripts/build-vm-kernel.sh') }}
      - name: Install kernel build dependencies
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc libelf-dev libssl-dev dwarves
      - name: Install cross-compiler
        if: steps.kernel-cache.outputs.cache-hit != 'true' && matrix.arch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install QEMU for cross-arch chroot
        if: matrix.arch == 'arm64'
        run: |
          if ! command -v qemu-aarch64-static &>/dev/null; then
            sudo apt-get update || true
            sudo apt-get install -y qemu-user-static
          fi
      - name: Build VM kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-vm-kernel.sh ${{ matrix.arch }} vmlinux-6.12-${{ matrix.arch }}
      - name: Build rootfs image
        run: |
          sudo ./scripts/build-vm-rootfs.sh ${{ matrix.arch }} rootfs-${{ matrix.arch }}.img
      - uses: actions/upload-artifact@v4
        with:
          name: vm-assets-${{ matrix.arch }}
          path: |
            vmlinux-6.12-${{ matrix.arch }}
            rootfs-${{ matrix.arch }}.img

  # Darwin builds happen AFTER linux + rootfs so checksums can be embedded.
  # The darwin binary is what users download on macOS — it must contain the
  # checksums for the VM assets it will fetch at runtime.
  build-darwin:
    runs-on: macos-latest
    needs: [build-linux, build-vm-assets]
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Embed asset checksums into source
        run: ./scripts/embed-checksums.sh release-assets
      - name: Verify checksums match assets
        run: go run scripts/check_checksums.go release-assets
      - name: Build agentcage binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-X main.version=${VERSION}" -o agentcage-darwin-${{ matrix.goarch }} ./cmd/agentcage/
      - name: Sign with virtualization entitlement
        run: codesign --entitlements entitlements.plist --force -s - agentcage-darwin-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: agentcage-darwin-${{ matrix.goarch }}

  build-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Build and pack SDK
        run: |
          cd sdk/typescript
          npm install
          npm run build
          npm pack
          mv agentcage-sdk-*.tgz ../../agentcage-sdk-${GITHUB_REF_NAME#v}.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: sdk
          path: agentcage-sdk-*.tgz

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin, build-vm-assets, build-cage-rootfs, build-falco, build-sdk]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agentcage-linux-amd64
            agentcage-linux-arm64
            agentcage-darwin-amd64
            agentcage-darwin-arm64
            cage-internal-*
            vmlinux-*
            rootfs-*.img
            cage-rootfs-*.ext4.gz
            falco-amd64
            falco-arm64
            agentcage-sdk-*
          generate_release_notes: true
