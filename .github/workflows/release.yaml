name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build agentcage binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -trimpath -o agentcage-linux-${{ matrix.goarch }} ./cmd/agentcage/
      - name: Build cage-internal binaries
        run: |
          for svc in cage-init payload-proxy findings-sidecar; do
            CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
              go build -trimpath -o cage-internal-${svc}-linux-${{ matrix.goarch }} ./cmd/cage-internal/${svc}/
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: |
            agentcage-linux-${{ matrix.goarch }}
            cage-internal-*-linux-${{ matrix.goarch }}

  build-vm-rootfs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Install qemu-user-static for cross-arch
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Build rootfs image
        run: |
          sudo ./scripts/build-vm-rootfs.sh rootfs-${{ matrix.arch }}.img
      - uses: actions/upload-artifact@v4
        with:
          name: vm-rootfs-${{ matrix.arch }}
          path: rootfs-${{ matrix.arch }}.img

  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build agentcage binary
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.goarch }} \
            go build -trimpath -o agentcage-darwin-${{ matrix.goarch }} ./cmd/agentcage/
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: agentcage-darwin-${{ matrix.goarch }}

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin, build-vm-rootfs]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agentcage-linux-amd64
            agentcage-linux-arm64
            agentcage-darwin-amd64
            agentcage-darwin-arm64
            cage-internal-*
            rootfs-*.img
          generate_release_notes: true
