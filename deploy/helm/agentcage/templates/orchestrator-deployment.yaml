apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agentcage
  labels:
    app: agentcage
spec:
  replicas: {{ .Values.agentcage.replicas }}
  selector:
    matchLabels:
      app: agentcage
  template:
    metadata:
      labels:
        app: agentcage
    spec:
      containers:
        - name: agentcage
          image: "{{ .Values.agentcage.image.repository }}:{{ .Values.agentcage.image.tag }}"
          args:
            - init
            - --config=/etc/agentcage/config.yaml
            - --grpc-addr=:9090
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
          resources:
            {{- toYaml .Values.agentcage.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/agentcage
              readOnly: true
            - name: data
              mountPath: /root/.agentcage
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
