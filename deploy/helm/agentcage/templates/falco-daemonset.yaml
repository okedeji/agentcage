{{- if .Values.falco.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-falco
  labels:
    app: agentcage-falco
spec:
  selector:
    matchLabels:
      app: agentcage-falco
  template:
    metadata:
      labels:
        app: agentcage-falco
    spec:
      containers:
        - name: falco
          image: falcosecurity/falco:latest
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev
              mountPath: /host/dev
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: rules
              mountPath: /etc/falco/rules.d
              readOnly: true
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: proc
          hostPath:
            path: /proc
        - name: rules
          configMap:
            name: {{ .Release.Name }}-falco-rules
{{- end }}
