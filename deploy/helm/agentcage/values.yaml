orchestrator:
  image:
    repository: agentcage/orchestrator
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  temporalAddr: temporal:7233
  policyDir: /etc/agentcage/policies

temporal:
  enabled: true

nats:
  enabled: true

vault:
  enabled: false
  externalAddr: ""

postgres:
  enabled: true
  persistence:
    size: 100Gi

opa:
  enabled: true
  image:
    repository: openpolicyagent/opa
    tag: latest

spire:
  enabled: true
  server:
    image:
      repository: ghcr.io/spiffe/spire-server
      tag: "1.9.0"
  agent:
    image:
      repository: ghcr.io/spiffe/spire-agent
      tag: "1.9.0"
  trustDomain: "agentcage.local"

cilium:
  enabled: true

falco:
  enabled: true

config:
  llmEndpoint: ""
  natsAddr: "nats:4222"
