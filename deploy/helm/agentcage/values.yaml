# agentcage Helm chart values
#
# For Kubernetes deployments where users bring their own infrastructure.
# In embedded mode (agentcage init), these are managed automatically.

agentcage:
  image:
    repository: agentcage/agentcage
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# External infrastructure — agentcage connects to these instead of
# running embedded instances when deployed on Kubernetes.

infrastructure:
  temporal:
    address: temporal:7233
  postgres:
    url: "postgres://agentcage:agentcage@postgres:5432/agentcage?sslmode=disable"
  nats:
    url: "nats://nats:4222"
  spire:
    server_address: spire-server:8081
    trust_domain: "agentcage.local"
  vault:
    enabled: false
    address: ""

# SPIRE identity management
spire:
  enabled: true
  server:
    image:
      repository: ghcr.io/spiffe/spire-server
      tag: "1.9.0"
  agent:
    image:
      repository: ghcr.io/spiffe/spire-agent
      tag: "1.9.0"
  trustDomain: "agentcage.local"

# Falco runtime monitoring
falco:
  enabled: true

# Platform config — passed as ConfigMap
config:
  llm:
    endpoint: ""
    api_key_env: ""
