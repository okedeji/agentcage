- rule: Unexpected Privileged Shell in Discovery Cage
  desc: Detects shell spawns with elevated privileges inside discovery cages
  condition: >
    spawned_process and proc.name in (bash, sh, dash, zsh) and proc.uid = 0
    and container.id != host
  output: "Privileged shell spawned in discovery cage (user=%user.name command=%proc.cmdline container=%container.id)"
  priority: WARNING
  tags: [agentcage, discovery, privilege_escalation]

- rule: Sensitive File Write in Discovery Cage
  desc: Detects writes to sensitive system paths
  condition: >
    open_write and (fd.name startswith /etc/ or fd.name startswith /proc/
    or fd.name startswith /sys/)
    and container.id != host
  output: "Sensitive file write in discovery cage (file=%fd.name command=%proc.cmdline container=%container.id)"
  priority: WARNING
  tags: [agentcage, discovery, file_write]

- rule: Privilege Escalation Attempt in Discovery Cage
  desc: Detects setuid, capability changes, or sudo usage
  condition: >
    (evt.type in (setuid, setgid, setreuid, setregid) or proc.name = sudo)
    and container.id != host
  output: "Privilege escalation attempt in discovery cage (syscall=%evt.type command=%proc.cmdline container=%container.id)"
  priority: CRITICAL
  tags: [agentcage, discovery, privilege_escalation]

- rule: Excessive Process Forking in Discovery Cage
  desc: Detects rapid process creation that may indicate a fork bomb
  condition: >
    evt.type = clone and container.id != host
  output: "Process fork in discovery cage (command=%proc.cmdline parent=%proc.pname container=%container.id)"
  priority: NOTICE
  tags: [agentcage, discovery, process_fork]
