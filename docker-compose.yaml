version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentcage
      POSTGRES_PASSWORD: agentcage
      POSTGRES_DB: agentcage
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcage"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: agentcage
      POSTGRES_PWD: agentcage
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]

  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command: ["run", "--server", "--addr", ":8181"]

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.0
    ports:
      - "8081:8081"
    command: ["-config", "/etc/spire/server.conf"]
    volumes:
      - spire_data:/opt/spire/data
      - ./deploy/spire/server.conf:/etc/spire/server.conf

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.9.0
    command: ["-config", "/etc/spire/agent.conf"]
    volumes:
      - spire_socket:/run/spire
      - ./deploy/spire/agent.conf:/etc/spire/agent.conf
    depends_on:
      - spire-server

  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  spire_data:
  spire_socket:
