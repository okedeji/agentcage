{{- if .Values.nomad.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentcage-infra.fullname" . }}-nomad
  labels:
    {{- include "agentcage-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nomad
spec:
  ports:
    - port: {{ .Values.nomad.port }}
      targetPort: 4646
      name: http
  selector:
    {{- include "agentcage-infra.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nomad
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentcage-infra.fullname" . }}-nomad
  labels:
    {{- include "agentcage-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nomad
spec:
  serviceName: {{ include "agentcage-infra.fullname" . }}-nomad
  replicas: {{ .Values.nomad.replicas }}
  selector:
    matchLabels:
      {{- include "agentcage-infra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nomad
  template:
    metadata:
      labels:
        {{- include "agentcage-infra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nomad
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- with .Values.nomad.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nomad.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nomad.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nomad
          image: {{ .Values.nomad.image }}
          args: ["agent", "-dev", "-bind", "0.0.0.0"]
          ports:
            - containerPort: 4646
              name: http
          volumeMounts:
            - name: data
              mountPath: /opt/nomad/data
          readinessProbe:
            httpGet:
              path: /v1/agent/health
              port: 4646
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/agent/health
              port: 4646
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.nomad.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.nomad.storageClass }}
        storageClassName: {{ .Values.nomad.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nomad.storage }}
{{- end }}
