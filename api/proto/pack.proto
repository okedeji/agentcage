syntax = "proto3";

package agentcage.pack.v1;

option go_package = "github.com/okedeji/agentcage/api/proto";

service PackService {
  // Pack accepts a bidirectional stream: the client sends source files,
  // the server streams progress updates and returns the final bundle ref.
  rpc Pack(stream PackRequest) returns (stream PackResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc InspectAgent(InspectAgentRequest) returns (InspectAgentResponse);
  rpc RemoveAgent(RemoveAgentRequest) returns (RemoveAgentResponse);
}

message PackRequest {
  oneof payload {
    PackMetadata metadata = 1;
    bytes chunk = 2;
  }
}

// PackMetadata is sent as the first message in the stream.
message PackMetadata {
  string cagefile_content = 1;
  string directory_name = 2;
  string tag = 3;
}

message PackResponse {
  oneof payload {
    PackProgress progress = 1;
    PackResult result = 2;
  }
}

message PackProgress {
  string stage = 1;
  string message = 2;
  int32 percent = 3;
}

message PackResult {
  string bundle_ref = 1;
  string name = 2;
  string tag = 3;
  string runtime = 4;
  string entrypoint = 5;
  int64 size_bytes = 6;
}

message ListAgentsRequest {}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message AgentInfo {
  string ref = 1;
  string name = 2;
  repeated string tags = 3;
  string runtime = 4;
  string entrypoint = 5;
  int64 size_bytes = 6;
  string files_hash = 7;
}

message InspectAgentRequest {
  string query = 1;
}

message InspectAgentResponse {
  AgentInfo agent = 1;
}

message RemoveAgentRequest {
  string query = 1;
}

message RemoveAgentResponse {
  string ref = 1;
}
