syntax = "proto3";
package agentcage.audit.v1;
option go_package = "github.com/okedeji/agentcage/api/proto";

import "google/protobuf/timestamp.proto";

service AuditService {
  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);
  rpc GetEntries(GetEntriesRequest) returns (GetEntriesResponse);
  rpc GetEntry(GetEntryRequest) returns (GetEntryResponse);
  rpc GetDigest(GetDigestRequest) returns (GetDigestResponse);
  rpc ExportCage(ExportCageRequest) returns (ExportCageResponse);
  rpc ListCagesWithAudit(ListCagesWithAuditRequest) returns (ListCagesWithAuditResponse);
  rpc GetKeyVersions(GetKeyVersionsRequest) returns (GetKeyVersionsResponse);
  rpc ChainStatus(ChainStatusRequest) returns (ChainStatusResponse);
}

message AuditEntry {
  string id = 1;
  string cage_id = 2;
  string assessment_id = 3;
  int64 sequence = 4;
  string type = 5;
  google.protobuf.Timestamp timestamp = 6;
  bytes data = 7;
  string key_version = 8;
  bytes signature = 9;
  bytes previous_hash = 10;
}

message AuditDigest {
  string assessment_id = 1;
  string cage_id = 2;
  bytes chain_head_hash = 3;
  int64 entry_count = 4;
  string key_version = 5;
  bytes signature = 6;
  google.protobuf.Timestamp issued_at = 7;
}

message VerifyChainRequest {
  string cage_id = 1;
}

message VerifyChainResponse {
  bool valid = 1;
  string error = 2;
  int64 entry_count = 3;
}

message GetEntriesRequest {
  string cage_id = 1;
  string type_filter = 2;
  int32 limit = 3;
}

message GetEntriesResponse {
  repeated AuditEntry entries = 1;
}

message GetEntryRequest {
  string entry_id = 1;
}

message GetEntryResponse {
  AuditEntry entry = 1;
}

message GetDigestRequest {
  string cage_id = 1;
}

message GetDigestResponse {
  AuditDigest digest = 1;
}

message ExportCageRequest {
  string cage_id = 1;
}

message ExportCageResponse {
  bytes export_json = 1;
}

message ListCagesWithAuditRequest {
  string assessment_id = 1;
}

message ListCagesWithAuditResponse {
  repeated string cage_ids = 1;
}

message GetKeyVersionsRequest {
  string cage_id = 1;
}

message GetKeyVersionsResponse {
  repeated string key_versions = 1;
}

message ChainStatusRequest {
  string cage_id = 1;
}

message ChainStatusResponse {
  string cage_id = 1;
  string assessment_id = 2;
  int64 entry_count = 3;
  google.protobuf.Timestamp first_timestamp = 4;
  google.protobuf.Timestamp latest_timestamp = 5;
  bool has_digest = 6;
  repeated string key_versions = 7;
}
