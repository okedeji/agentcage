syntax = "proto3";
package agentcage.fleet.v1;
option go_package = "github.com/okedeji/agentcage/api/proto";

service FleetService {
  rpc GetFleetStatus(GetFleetStatusRequest) returns (GetFleetStatusResponse);
  rpc DrainHost(DrainHostRequest) returns (DrainHostResponse);
  rpc GetCapacity(GetCapacityRequest) returns (GetCapacityResponse);
}

enum HostPool {
  HOST_POOL_UNSPECIFIED = 0;
  HOST_POOL_ACTIVE = 1;
  HOST_POOL_WARM = 2;
  HOST_POOL_PROVISIONING = 3;
  HOST_POOL_DRAINING = 4;
}

enum HostState {
  HOST_STATE_UNSPECIFIED = 0;
  HOST_STATE_INITIALIZING = 1;
  HOST_STATE_READY = 2;
  HOST_STATE_BUSY = 3;
  HOST_STATE_DRAINING = 4;
  HOST_STATE_OFFLINE = 5;
}

message PoolStatus {
  HostPool pool = 1;
  int32 host_count = 2;
  int32 cage_slots_total = 3;
  int32 cage_slots_used = 4;
}

message HostInfo {
  string host_id = 1;
  HostPool pool = 2;
  HostState state = 3;
  int32 cage_slots_total = 4;
  int32 cage_slots_used = 5;
  int32 vcpus_total = 6;
  int32 vcpus_used = 7;
  int32 memory_mb_total = 8;
  int32 memory_mb_used = 9;
}

message FleetStatus {
  int32 total_hosts = 1;
  repeated PoolStatus pools = 2;
  float capacity_utilization_ratio = 3;
}

message GetFleetStatusRequest {}

message GetFleetStatusResponse {
  FleetStatus status = 1;
}

message DrainHostRequest {
  string host_id = 1;
  string reason = 2;
  bool force = 3;
}

message DrainHostResponse {}

message GetCapacityRequest {}

message GetCapacityResponse {
  repeated PoolStatus pools = 1;
  int32 available_cage_slots = 2;
}
