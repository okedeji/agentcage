syntax = "proto3";
package agentcage.intervention.v1;
option go_package = "github.com/okedeji/agentcage/api/proto";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

service InterventionService {
  rpc ListInterventions(ListInterventionsRequest) returns (ListInterventionsResponse);
  rpc ResolveCageIntervention(ResolveCageInterventionRequest) returns (ResolveCageInterventionResponse);
  rpc ResolveAssessmentReview(ResolveAssessmentReviewRequest) returns (ResolveAssessmentReviewResponse);
  rpc ResolveProofGap(ResolveProofGapRequest) returns (ResolveProofGapResponse);
}

enum InterventionType {
  INTERVENTION_TYPE_UNSPECIFIED = 0;
  INTERVENTION_TYPE_TRIPWIRE_ESCALATION = 1;
  INTERVENTION_TYPE_PAYLOAD_REVIEW = 2;
  INTERVENTION_TYPE_REPORT_REVIEW = 3;
  INTERVENTION_TYPE_PROOF_GAP = 4;
}

enum ProofGapAction {
  PROOF_GAP_ACTION_UNSPECIFIED = 0;
  PROOF_GAP_ACTION_RETRY = 1;
  PROOF_GAP_ACTION_SKIP = 2;
}

enum InterventionAction {
  INTERVENTION_ACTION_UNSPECIFIED = 0;
  INTERVENTION_ACTION_RESUME = 1;
  INTERVENTION_ACTION_ADJUST_AND_RESUME = 2;
  INTERVENTION_ACTION_KILL = 3;
  INTERVENTION_ACTION_ALLOW = 4;
  INTERVENTION_ACTION_BLOCK = 5;
}

enum InterventionStatus {
  INTERVENTION_STATUS_UNSPECIFIED = 0;
  INTERVENTION_STATUS_PENDING = 1;
  INTERVENTION_STATUS_RESOLVED = 2;
  INTERVENTION_STATUS_TIMED_OUT = 3;
}

enum InterventionPriority {
  INTERVENTION_PRIORITY_UNSPECIFIED = 0;
  INTERVENTION_PRIORITY_LOW = 1;
  INTERVENTION_PRIORITY_MEDIUM = 2;
  INTERVENTION_PRIORITY_HIGH = 3;
  INTERVENTION_PRIORITY_CRITICAL = 4;
}

enum ReviewDecision {
  REVIEW_DECISION_UNSPECIFIED = 0;
  REVIEW_DECISION_APPROVE = 1;
  REVIEW_DECISION_REQUEST_RETEST = 2;
  REVIEW_DECISION_REJECT = 3;
}

message InterventionInfo {
  string intervention_id = 1;
  InterventionType type = 2;
  InterventionStatus status = 3;
  InterventionPriority priority = 4;
  string cage_id = 5;
  string assessment_id = 6;
  string description = 7;
  bytes context_data = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp resolved_at = 10;
  google.protobuf.Duration timeout = 11;
}

message FindingAdjustment {
  string finding_id = 1;
  string severity_override = 2;
  string rationale = 3;
}

message ResolveCageInterventionRequest {
  string intervention_id = 1;
  InterventionAction action = 2;
  string rationale = 3;
  map<string, string> adjustments = 4;
}

message ResolveCageInterventionResponse {}

message ResolveAssessmentReviewRequest {
  string intervention_id = 1;
  ReviewDecision decision = 2;
  string rationale = 3;
  repeated FindingAdjustment adjustments = 4;
}

message ResolveAssessmentReviewResponse {}

message ResolveProofGapRequest {
  string intervention_id = 1;
  ProofGapAction action = 2;
  string rationale = 3;
}

message ResolveProofGapResponse {}

message ListInterventionsRequest {
  InterventionStatus status_filter = 1;
  InterventionType type_filter = 2;
  string assessment_id_filter = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListInterventionsResponse {
  repeated InterventionInfo interventions = 1;
  string next_page_token = 2;
}
